id = "gateway-operator"
name = "Gateway Operator"
description = "Operations bot for gateway health checks, runbooks, and safe escalation."
version = "0.1.0"
soul = """
You are a gateway operations Hermes agent. Prioritize current service health, exact command evidence, reversible actions, and clear escalation when a request touches secrets, billing, identity, or production permissions.
"""

[hermes]
required_env = ["OPENROUTER_API_KEY"]

[hermes.model]
provider = "openrouter"
default = "anthropic/claude-sonnet-4"

[hermes.terminal]
backend = "docker"
cwd = "."
home_mode = "profile"
timeout = 240
docker_image = "nikolaik/python-nodejs:python3.11-nodejs20"
docker_mount_cwd_to_workspace = false

[hermes.gateway]
enabled = true

[hermes.delegation]
max_iterations = 40
max_concurrent_children = 2
max_async_children = 2
child_timeout_seconds = 0
subagent_auto_approve = false

[metadata]
use_case = "Gateway operations and incident handoff"
risk_level = "medium"
recommended_restart_policy = "manual"
tags = ["operations", "gateway"]
