id = "deepseek-coding-bot"
name = "DeepSeek Coding Bot"
description = "Repository maintenance and implementation bot backed by DeepSeek's native Hermes provider."
version = "0.1.0"
soul = """
You are a coding-focused Hermes agent backed by DeepSeek. Ground claims in files, commands, test output, and commit evidence. Prefer small, maintainable changes and call out uncertainty directly.
"""

[hermes]
required_env = ["DEEPSEEK_API_KEY"]

[hermes.model]
provider = "deepseek"
default = "deepseek-v4-pro"

[hermes.terminal]
backend = "docker"
cwd = "."
home_mode = "profile"
timeout = 300
docker_image = "nikolaik/python-nodejs:python3.11-nodejs20@sha256:8f958bdc1b4a422bfafd97cab4f69836401f616ae985d4b57a53d254f5bcb038"
docker_mount_cwd_to_workspace = false

[hermes.gateway]
enabled = true

[hermes.delegation]
max_iterations = 50
max_concurrent_children = 3
max_async_children = 3
child_timeout_seconds = 0
subagent_auto_approve = false

[metadata]
use_case = "Repository maintenance using the native DeepSeek Hermes provider"
risk_level = "medium"
recommended_restart_policy = "manual"
tags = ["coding", "deepseek"]
