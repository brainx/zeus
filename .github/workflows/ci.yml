name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"
      - name: Check formatting
        run: ruff format --check .
      - name: Lint Python
        run: ruff check .
      - name: Type check
        run: mypy zeus
      - name: Security scan
        run: bandit -r zeus
      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh
      - name: Run test suite
        run: sh scripts/test.sh
      - name: Run repository contract check
        run: sh scripts/repo_check.sh
      - name: Check coverage
        run: |
          coverage erase
          coverage run -m unittest discover -s tests
          coverage report

  lifecycle-subprocess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"
      - name: Run subprocess lifecycle tests
        run: python -m unittest tests.test_subprocess_lifecycle

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install package build tools
        run: python -m pip install -e ".[dev]"
      - name: Build package
        run: |
          rm -rf dist
          python -m build
      - name: Smoke test built wheel
        run: ZEUS_WHEEL_SMOKE_BUILD=0 sh scripts/wheel_smoke.sh
      - name: Check package metadata
        run: twine check dist/*
