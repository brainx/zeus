name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Validate release tag
        run: |
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = tag || {
            echo "Release tags must be annotated tags." >&2
            exit 1
          }
          python scripts/check_version_tag.py "${GITHUB_REF_NAME}" --require-changelog
      - name: Require GitHub-verified release ref
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_verified_release_ref.py
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"
      - name: Run full release gate and build artifacts
        run: make release-check
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download checked distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: Verify artifact checksums
        run: cd dist && sha256sum -c SHA256SUMS.txt
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS.txt
      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
